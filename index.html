<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabinet JBK Conseils</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel pour le JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Configuration Tailwind personnalisée pour les polices -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'ivory': '#FDFBF7',
                        'charcoal': '#111111',
                        'gold': '#C5A059',
                        'gold-dark': '#B08D4B',
                    },
                    animation: {
                        'slide-left': 'slideLeft 1s ease-out',
                        'slide-right': 'slideRight 1s ease-out',
                    }
                }
            }
        }
    </script>

    <style>
        /* Styles globaux pour assurer la fluidité */
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #FDFBF7;
            color: #333333;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* Masquer la scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #FDFBF7;
        }
        ::-webkit-scrollbar-thumb {
            background: #C5A059;
            border-radius: 4px;
        }
        .form-success {
            animation: pulse 2s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ICÔNES SVG
        const Building = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>);
        const Scale = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>);
        const Briefcase = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 10V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v3"/><path d="M5 20h14"/><path d="M4 16h16"/><line x1="8" y1="12" x2="8" y2="16"/><line x1="16" y1="12" x2="16" y2="16"/></svg>);
        const BalanceScale = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="3"/><path d="M19.1 15.23L19.1 17a2 2 0 0 1-2 2h-2.18a2 2 0 0 1-2-2v-2"/><path d="M4.9 15.23L4.9 17a2 2 0 0 1 2 2h2.18a2 2 0 0 1 2 2v2"/><path d="M15 8.61L15 6a2 2 0 0 0 2-2 2 2 0 0 1 2-2h2"/><path d="M9 8.61L9 6a2 2 0 0 1-2-2 2 2 0 0 0-2-2H3"/><line x1="12" y1="21" x2="12" y2="15"/></svg>);
        const Phone = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>);
        const Mail = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>);
        const WhatsApp = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.446l-.032-.017-1.135-.58a3.484 3.484 0 0 1-1.686-.91 3.478 3.478 0 0 1-.533-1.528l-.025-.133-.012-.067a3.402 3.402 0 0 1 .383-2.299l.017-.022.007-.006.034-.035.002-.002c.276-.224.641-.446.99-.668.348-.222.803-.387 1.31-.489.507-.102 1.058-.08 1.617.07.559.15 1.195.48 1.876.943l.007.007.007.007c.38.346.715.729 1.001 1.148.285.42.54.888.757 1.391.217.503.353 1.042.382 1.597.029.555-.071 1.12-.249 1.66-.178.54-.502 1.07-.92 1.505-.419.435-1.007.787-1.7.987-.693.2-1.462.322-2.266.36-.806.038-1.617.026-2.38-.11-.762-.136-1.523-.384-2.232-.774l-.033-.026-.026-.024-.013-.013-.006-.006-.007-.007-.034-.035-.017-.022a3.402 3.402 0 0 1-.383-2.299l-.012-.067-.025-.133a3.478 3.478 0 0 1-.533-1.528 3.484 3.484 0 0 1-1.686-.91l-1.135-.58-.032-.017a9.87 9.WhatsApp 9.87 0 0 1-5.031-1.446h-.004z"/></svg>);
        const Linkedin = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>);
        const Facebook = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>);
        const Check = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12"/></svg>);
        const Landmark = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg>);

        // Composant Reveal avec motion avancé
        const RevealMotion = ({ children, delay = 0, direction = 'up', stagger = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => ref.current && observer.unobserve(ref.current);
            }, []);

            const animationClass = isVisible 
                ? `opacity-100 animate-${direction === 'left' ? 'slideLeft' : direction === 'right' ? 'slideRight' : 'fadeIn'}`
                : 'opacity-0';

            return (
                <div
                    ref={ref}
                    className={`transition-all duration-1000 ease-out transform ${animationClass}`}
                    style={{ transitionDelay: `${delay + stagger}ms` }}
                >
                    {children}
                </div>
            );
        };

        // Composant Formulaire Rapide
        const QuickForm = () => {
            const [formData, setFormData] = useState({ name: '', phone: '', message: '' });
            const [status, setStatus] = useState('idle');
            const [submitted, setSubmitted] = useState(false);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setStatus('sending');
                // Simulate WhatsApp send or email
                setTimeout(() => {
                    setStatus('sent');
                    setSubmitted(true);
                    setFormData({ name: '', phone: '', message: '' });
                    setTimeout(() => setStatus('idle'), 3000);
                }, 1000);
            };

            if (submitted) {
                return (
                    <div className="bg-gold/10 p-8 rounded-xl border-2 border-gold text-center animate-pulse">
                        <Check className="w-16 h-16 text-gold mx-auto mb-4" />
                        <h3 className="font-serif text-2xl mb-2">Message envoyé !</h3>
                        <p className="text-white/80">Nous vous contactons sous 24h</p>
                        <Button variant="gold" onClick={() => setSubmitted(false)} className="mt-6">
                            Nouveau message
                        </Button>
                    </div>
                );
            }

            return (
                <form onSubmit={handleSubmit} className="space-y-4 max-w-md mx-auto">
                    <div>
                        <input 
                            type="text" 
                            name="name" 
                            placeholder="Votre nom" 
                            value={formData.name}
                            onChange={handleChange}
                            required
                            className="w-full p-4 bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl text-white placeholder-white/70 focus:outline-none focus:border-gold transition-all duration-300"
                        />
                    </div>
                    <div>
                        <input 
                            type="tel" 
                            name="phone" 
                            placeholder="Téléphone/WhatsApp" 
                            value={formData.phone}
                            onChange={handleChange}
                            required
                            className="w-full p-4 bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl text-white placeholder-white/70 focus:outline-none focus:border-gold transition-all duration-300"
                        />
                    </div>
                    <div>
                        <textarea 
                            name="message" 
                            rows="3"
                            placeholder="Votre demande rapide..." 
                            value={formData.message}
                            onChange={handleChange}
                            className="w-full p-4 bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl text-white placeholder-white/70 focus:outline-none focus:border-gold transition-all duration-300 resize-none"
                        />
                    </div>
                    <Button variant="gold" type="submit" disabled={status === 'sending'} className="w-full">
                        {status === 'sending' ? 'Envoi...' : 'Envoyer (1 min)'}
                    </Button>
                </form>
            );
        };

        // Composant ServiceCard avec gestion de l'état "Voir plus/moins"
        const ServiceCard = ({ service, index }) => {
            const [expanded, setExpanded] = useState(false);
            const isExpandable = !!service.details;

            return (
                <RevealMotion direction={index % 2 === 0 ? 'left' : 'right'} delay={index * 150} className="group">
                    <div className="group bg-white/70 backdrop-blur-md p-8 md:p-10 rounded-2xl border border-stone-200 hover:border-gold/80 hover:shadow-2xl hover:shadow-gold/10 transition-all duration-700 hover:-translate-y-2 hover:scale-[1.02] flex flex-col h-full">
                        <div className="flex items-start mb-6 group-hover:scale-110 transition-transform duration-500">
                            <div className="text-gold shrink-0 mt-1 w-12 h-12 flex items-center justify-center bg-gold/10 rounded-xl mr-4 group-hover:bg-gold/20 transition-all duration-500">
                                <service.icon className="w-6 h-6" />
                            </div>
                            <div>
                                <h3 className="font-serif text-xl mb-4 text-charcoal group-hover:text-gold transition-colors duration-300">{service.title}</h3>
                            </div>
                        </div>
                        <div className="flex-grow">
                            <div className="text-sm text-stone-600 leading-relaxed">
                                {service.desc}
                            </div>
                            {isExpandable && expanded && (
                                <div className="mt-6 text-sm text-stone-600 leading-relaxed border-t border-gold/20 pt-6 animate-fadeIn">
                                    {service.details}
                                </div>
                            )}
                        </div>
                        {isExpandable && (
                            <button 
                                onClick={() => setExpanded(!expanded)} 
                                className="mt-8 text-gold text-[10px] md:text-xs font-bold tracking-[0.2em] uppercase hover:text-charcoal transition-colors self-start flex items-center bg-gold/5 px-4 py-2 rounded-lg border border-gold/20 hover:border-gold/50"
                            >
                                {expanded ? '- Voir moins' : '+ Voir tous les domaines'}
                            </button>
                        )}
                    </div>
                </RevealMotion>
            );
        };

        // Composant SectionTitle avec animation
        const SectionTitle = ({ title, subtitle, align = "center" }) => (
            <RevealMotion direction="up" delay={100}>
                <div className={`mb-16 text-${align}`}>
                    <span className="block text-gold text-xs font-bold tracking-[0.2em] uppercase mb-4">
                        {subtitle}
                    </span>
                    <h2 className="font-serif text-3xl md:text-4xl text-charcoal leading-tight">
                        {title}
                    </h2>
                    <div className={`mt-6 h-[1px] w-16 bg-gold ${align === 'center' ? 'mx-auto' : ''} opacity-60`}></div>
                </div>
            </RevealMotion>
        );

        // Composant Button
        const Button = ({ children, variant = "primary", onClick, className = "", disabled = false }) => {
            const baseStyle = "inline-flex items-center justify-center px-8 py-4 text-xs font-bold tracking-[0.15em] uppercase transition-all duration-500 ease-out cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed rounded-full";
            const variants = {
                primary: "bg-charcoal text-white hover:bg-gold hover:text-white border border-charcoal hover:border-gold",
                outline: "bg-transparent text-charcoal border border-charcoal hover:bg-charcoal hover:text-white",
                gold: "bg-gold text-white hover:bg-gold-dark border border-gold hover:border-gold-dark"
            };

            return (
                <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} disabled={disabled}>
                    {children}
                </button>
            );
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setMenuOpen(false);
                }
            };

            return (
                <div className="bg-ivory min-h-screen font-sans text-[#333333] selection:bg-gold selection:text-white overflow-x-hidden">

                    {/* Navigation avec hover motion */}
                    <nav className={`fixed w-full z-50 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-md py-4 shadow-lg shadow-black/5' : 'bg-transparent py-8'}`}>
                        <div className="container mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div className="z-50 cursor-pointer group" onClick={() => window.location.href = 'index.html'}>
                                <div className={`font-serif text-2xl tracking-tighter transition-colors duration-300 ${scrolled ? 'text-charcoal' : 'text-white'} group-hover:text-gold`}>Cabinet <span className="text-gold">JBK Conseils</span></div>
                            </div>

                            {/* Desktop Menu avec hover */}
                            <div className="hidden md:flex items-center space-x-10">
                                <a href="fondateur.html" className={`text-xs font-bold tracking-[0.15em] uppercase transition-all duration-300 hover:scale-105 hover:text-gold ${scrolled ? 'text-charcoal' : 'text-white'}`} style={{textDecoration:'none'}}>Fondateur</a>
                                <a href="services.html" className={`text-xs font-bold tracking-[0.15em] uppercase transition-all duration-300 hover:scale-105 hover:text-gold ${scrolled ? 'text-charcoal' : 'text-white'}`} style={{textDecoration:'none'}}>Services</a>
                                <a href="contact.html" className={`text-xs font-bold tracking-[0.15em] uppercase transition-all duration-300 hover:scale-105 hover:text-gold ${scrolled ? 'text-charcoal' : 'text-white'}`} style={{textDecoration:'none'}}>Contact</a>
                                <Button variant={scrolled ? "primary" : "outline"} onClick={() => window.location.href='contact.html'} className={scrolled ? "" : "border-white text-white hover:bg-white hover:text-charcoal"}>Prendre RDV</Button>
                            </div>

                            {/* Mobile Menu Toggle avec rotation */}
                            <div className="md:hidden z-50">
                                <button onClick={() => setMenuOpen(!menuOpen)} className={`p-2 rounded-lg hover:bg-white/20 transition-all duration-300 ${scrolled || menuOpen ? 'text-charcoal' : 'text-white'}`}>
                                    <div className="space-y-1.5 w-6 h-6 flex flex-col justify-center">
                                        <span className={`block w-full h-0.5 bg-current transition-all duration-300 ${menuOpen ? 'rotate-45 translate-y-1' : ''}`}></span>
                                        <span className={`block w-full h-0.5 bg-current transition-all duration-300 ${menuOpen ? 'opacity-0 translate-x-3' : ''}`}></span>
                                        <span className={`block w-full h-0.5 bg-current transition-all duration-300 ${menuOpen ? '-rotate-45 -translate-y-1' : ''}`}></span>
                                    </div>
                                </button>
                            </div>
                        </div>

                        {/* Mobile Overlay avec backdrop blur */}
                        <div className={`fixed inset-0 bg-ivory/95 backdrop-blur-md flex flex-col justify-center items-center space-y-8 transition-all duration-500 ease-in-out z-40 ${menuOpen ? 'scale-100 opacity-100' : 'scale-75 opacity-0 pointer-events-none'}`}>
                            <a href="fondateur.html" className="font-serif text-3xl text-charcoal hover:text-gold transition-colors duration-300" style={{textDecoration:'none'}}>Fondateur</a>
                            <a href="services.html" className="font-serif text-3xl text-charcoal hover:text-gold transition-colors duration-300" style={{textDecoration:'none'}}>Services</a>
                            <a href="contact.html" className="font-serif text-3xl text-charcoal hover:text-gold transition-colors duration-300" style={{textDecoration:'none'}}>Contact</a>
                        </div>
                    </nav>

                    {/* Hero avec parallax subtil */}
                    <section id="home" className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0">
                            <img 
                                src="images/background page d'acceuil.png" 
                                alt="Cabinet JBK Conseils Background" 
                                className="w-full h-full object-cover brightness-110"
                                style={{ imageRendering: 'high-quality' }}
                            />
                            <div className="absolute inset-0 bg-gradient-to-b from-charcoal/50 via-charcoal/30 to-charcoal/70"></div>
                        </div>

                        <div className="relative container mx-auto px-6 md:px-12 text-center z-10">
                            <RevealMotion direction="up" delay={0}>
                                <p className="text-gold text-xs md:text-sm font-bold tracking-[0.3em] uppercase mb-8">
                                    Cabinet JBK Conseils
                                </p>
                            </RevealMotion>
                            <RevealMotion direction="up" delay={200}>
                                <h1 className="font-serif text-4xl md:text-6xl lg:text-7xl leading-tight mb-10 bg-gradient-to-r from-white to-stone-200 bg-clip-text text-transparent">
                                    Excellence juridique au service de vos intérêts
                                </h1>
                            </RevealMotion>
                            <RevealMotion direction="up" delay={400}>
                                <p className="text-stone-400 max-w-2xl mx-auto text-lg font-light leading-relaxed mb-12">
                                    Nous accompagnons particuliers, entreprises et investisseurs avec rigueur, discrétion et efficacité dans le droit minier et des affaires.
                                </p>
                            </RevealMotion>
                            <RevealMotion direction="up" delay={600}>
                                <Button variant="primary" onClick={() => scrollToSection('presentation')} className="text-lg px-12 py-5">
                                    Besoin d'un accompagnement juridique fiable ?
                                </Button>
                            </RevealMotion>
                        </div>

                        <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2">
                            <div className="flex space-x-2 items-center">
                                <div className="w-1 h-12 bg-gradient-to-b from-transparent via-gold to-transparent animate-bounce"></div>
                                <span className="text-white/70 font-light text-sm rotate-[-90deg] tracking-wider">SCROLL</span>
                            </div>
                        </div>
