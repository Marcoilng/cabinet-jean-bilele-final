<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Équipe | Cabinet JBK Conseils</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel pour le JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">

    <!-- Configuration Tailwind personnalisée -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'ivory': '#FDFBF7',
                        'charcoal': '#111111',
                        'gold': '#C5A059',
                        'gold-dark': '#B08D4B',
                    },
                    animation: {
                        'fade-in': 'fadeIn 1.5s ease-out forwards',
                        'slide-up': 'slideUp 1s ease-out forwards',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --ivory: #FDFBF7;
            --charcoal: #111111;
            --gold: #C5A059;
            --gold-dark: #B08D4B;
            --gold-light: rgba(197, 160, 89, 0.1);
            --stone: #F5F3EF;
            --text: #333;
            --muted: #6b6b6b;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(.8);
                opacity: 1;
            }

            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes scroll-hint {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }

            50% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(10px);
            }
        }

        @keyframes ken-burns {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        :root {
            --ivory: #FDFBF7;
            --charcoal: #111111;
            --gold: #C5A059;
            --gold-dark: #B08D4B;
            --gold-light: rgba(197, 160, 89, 0.15);
            --stone: #F5F3EF;
            --text: #333;
            --muted: #6b6b6b;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(197, 160, 89, 0.2);
        }

        html {
            scroll-behavior: smooth;
            cursor: default;
        }

        body {
            background-color: var(--ivory);
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 86c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm66 3c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm-46-45c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zm26 18c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zm16 18c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zM24 46c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zm34-40c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zm2-2c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zm-40 44c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zM66 18c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1z' fill='%23c5a059' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: var(--text);
            font-family: 'Lato', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 2rem 0;
            transition: all .6s ease;
        }

        nav.scrolled {
            background: rgba(253, 251, 247, .96);
            backdrop-filter: blur(12px);
            padding: 1rem 0;
            box-shadow: 0 2px 30px rgba(0, 0, 0, .07);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            letter-spacing: -.02em;
            text-decoration: none;
            color: #fff;
            transition: color .3s;
        }

        nav.scrolled .nav-logo {
            color: var(--charcoal);
        }

        .nav-logo span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: #fff;
            transition: color .3s, transform .3s;
            position: relative;
        }

        nav.scrolled .nav-links a {
            color: var(--charcoal);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gold);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .3s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            transform: scaleX(1);
        }

        .nav-links a.active {
            color: var(--gold);
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: .8rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all .4s;
            border-radius: 50px;
        }

        nav.scrolled .btn-nav {
            background: var(--charcoal);
            color: #fff;
            border-color: var(--charcoal);
        }

        .btn-nav:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: #fff;
        }

        .btn-nav::after {
            display: none !important;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            border: none;
            background: transparent;
            padding: 4px;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #fff;
            transition: all .3s;
            border-radius: 2px;
        }

        nav.scrolled .hamburger span {
            background: var(--charcoal);
        }

        .hamburger.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.open span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .mobile-menu {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(253, 251, 247, .97);
            backdrop-filter: blur(16px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s;
        }

        .mobile-menu.open {
            opacity: 1;
            pointer-events: all;
            display: flex;
        }

        .mobile-menu a {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--charcoal);
            text-decoration: none;
            transition: color .3s;
        }

        .mobile-menu a:hover {
            color: var(--gold);
        }

        /* FOOTER */
        footer {
            background: #0a0a0a;
            color: rgba(255, 255, 255, .4);
            padding: 4rem 0 2rem;
            border-top: 1px solid rgba(255, 255, 255, .05);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 1rem;
        }

        .footer-logo span {
            color: var(--gold);
        }

        .footer-desc {
            font-size: .9rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            max-width: 320px;
        }

        .footer-social-flex {
            display: flex;
            gap: .8rem;
        }

        .footer-social {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, .6);
            transition: all .3s;
            text-decoration: none;
        }

        .footer-social:hover {
            background: var(--gold);
            color: #fff;
            transform: translateY(-3px);
        }

        .footer-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 1.5rem;
        }

        .footer-links-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: .8rem;
        }

        .footer-links-list li {
            display: flex;
            align-items: flex-start;
            gap: .75rem;
        }

        .footer-links-list a {
            color: inherit;
            text-decoration: none;
            transition: color .3s;
            font-size: .9rem;
        }

        .footer-links-list a:hover {
            color: var(--gold);
        }

        .footer-icon-wrap {
            width: 18px;
            margin-top: 2px;
            color: var(--gold);
            flex-shrink: 0;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, .08);
            padding-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            font-size: .8rem;
            opacity: .7;
        }

        .footer-bottom a {
            color: var(--gold);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-bottom a:hover {
            text-decoration: underline;
            opacity: 1;
        }

        /* WHATSAPP */
        .wa-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 200;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, .5);
            text-decoration: none;
            animation: float 3s ease-in-out infinite;
            transition: transform .3s, box-shadow .3s;
        }

        .wa-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(37, 211, 102, .6);
        }

        .wa-float::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(37, 211, 102, .4);
            animation: pulse-ring 2s ease-out infinite;
        }

        @media(max-width:900px) {
            .nav-links {
                display: none;
            }

            .hamburger {
                display: flex;
            }
        }

        /* HERO ENHANCEMENTS */
        .hero-bg {
            overflow: hidden;
        }

        .hero-bg img {
            animation: ken-burns 20s ease infinite alternate;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--gold);
            opacity: .7;
        }

        .scroll-dot {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            animation: scroll-hint 2s ease-in-out infinite;
        }

        /* CARD ENHANCEMENTS */
        .member-card {
            transition: all .6s cubic-bezier(0.23, 1, 0.32, 1);
            background: var(--glass);
            backdrop-filter: blur(10px);
        }

        .member-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid var(--glass-border);
            border-radius: inherit;
            pointer-events: none;
            transition: all .4s;
        }

        .member-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, .08);
        }

        .member-card:hover::after {
            border-color: var(--gold);
        }

        .member-img-wrap {
            overflow: hidden;
            position: relative;
            border-radius: inherit;
        }

        .member-img {
            transition: transform .8s cubic-bezier(0.23, 1, 0.32, 1);
            filter: grayscale(1) contrast(1.1);
        }

        .member-card:hover .member-img {
            transform: scale(1.1) rotate(1deg);
            filter: grayscale(0) contrast(1);
        }

        .card-gold-flash {
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(197, 160, 89, 0.2), transparent);
            transform: translateX(-100%);
            transition: transform .6s;
        }

        .member-card:hover .card-gold-flash {
            transform: translateX(100%);
        }

        .role-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            background: var(--gold-light);
            border: 0.5px solid var(--glass-border);
            border-radius: 50px;
            color: var(--gold);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .bio-text {
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            margin-bottom: 1.5rem;
        }

        .member-card:hover .bio-text {
            -webkit-line-clamp: initial;
            line-clamp: initial;
        }

        .section-intro {
            max-width: 600px;
            margin: 0 auto 4rem;
            text-align: center;
            position: relative;
        }

        .section-intro-bar {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 1.5rem auto;
        }

        .section-intro p {
            font-size: 1rem;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.6;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--ivory);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icons
        const Mail = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></svg>);
        const Phone = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" /></svg>);
        const Linkedin = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" /><rect x="2" y="9" width="4" height="12" /><circle cx="4" cy="4" r="2" /></svg>);

        const Reveal = ({ children, delay = 0, direction = "up", distance = 40 }) => {
            const [visible, setVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => setVisible(true), delay);
                        observer.unobserve(entry.target);
                    }
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => ref.current && observer.unobserve(ref.current);
            }, [delay]);

            const getTransform = () => {
                if (!visible) {
                    switch (direction) {
                        case "up": return `translateY(${distance}px)`;
                        case "down": return `translateY(-${distance}px)`;
                        case "left": return `translateX(${distance}px)`;
                        case "right": return `translateX(-${distance}px)`;
                        default: return `translateY(${distance}px)`;
                    }
                }
                return "translate(0,0)";
            };

            return (
                <div
                    ref={ref}
                    className={`transition-all duration-1000 cubic-bezier(0.23, 1, 0.32, 1) ${visible ? 'opacity-100' : 'opacity-0'}`}
                    style={{ transform: getTransform() }}
                >
                    {children}
                </div>
            );
        };

        const MemberCard = ({ member, delay }) => (
            <Reveal delay={delay} distance={60}>
                <div className="member-card group relative rounded-[2rem] overflow-hidden flex flex-col h-full">
                    <div className="member-img-wrap aspect-[4/5]">
                        <img
                            src={member.image}
                            alt={member.name}
                            className="member-img w-full h-full object-cover"
                        />
                        <div className="card-gold-flash"></div>
                        <div className="absolute inset-0 bg-gradient-to-t from-charcoal/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>

                        {/* Social Icons - Staggered */}
                        <div className="absolute top-6 right-6 flex flex-col gap-3">
                            <a href="#" className="w-10 h-10 rounded-full bg-ivory/10 backdrop-blur-md border border-white/20 flex items-center justify-center text-white hover:bg-gold hover:border-gold transition-all duration-300 opacity-0 group-hover:opacity-100 translate-x-10 group-hover:translate-x-0" style={{ transitionDelay: '100ms' }}>
                                <Linkedin className="w-4 h-4" />
                            </a>
                            <a href="#" className="w-10 h-10 rounded-full bg-ivory/10 backdrop-blur-md border border-white/20 flex items-center justify-center text-white hover:bg-gold hover:border-gold transition-all duration-300 opacity-0 group-hover:opacity-100 translate-x-10 group-hover:translate-x-0" style={{ transitionDelay: '200ms' }}>
                                <Mail className="w-4 h-4" />
                            </a>
                        </div>
                    </div>

                    <div className="p-8 flex-grow flex flex-col z-10 relative">
                        <div className="role-badge">{member.role}</div>
                        <h3 className="font-serif text-2xl text-charcoal mb-4 group-hover:text-gold transition-colors duration-300">{member.name}</h3>
                        <p className="bio-text text-stone-500 text-sm leading-relaxed font-light transition-all duration-500">
                            {member.bio}
                        </p>

                        <div className="mt-auto pt-4 flex items-center gap-2 text-gold text-[10px] font-bold tracking-widest uppercase opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                            VOIR LE PROFIL <span className="text-xs">→</span>
                        </div>
                    </div>
                </div>
            </Reveal>
        );

        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 60);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const team = [
                {
                    name: "Maître jean Bilele",
                    role: "Avocat Principal & Fondateur",
                    image: "images/maitre jean bilele.jpeg",
                    bio: "Expert reconnu en droit minier et des affaires, Maître Bilele dirige le cabinet avec une vision d'excellence et d'intégrité.",
                    category: "direction"
                },
                {
                    name: "Maître Sarah Mutamba",
                    role: "Avocate Associée (Droit des Affaires)",
                    image: "images/equipe/member2.png",
                    bio: "Spécialisée dans l'accompagnement des entreprises internationales et la conformité aux normes OHADA.",
                    category: "associes"
                },
                {
                    name: "Maître Patrick Kalala",
                    role: "Avocat Associé (Droit Minier)",
